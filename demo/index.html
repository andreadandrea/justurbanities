<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justurbanities — Demo</title>
  <link rel="stylesheet" href="style.css">
  <script src="data-embed.js" defer></script>
  <script src="game.js" defer></script>
</head>
<body>
  <div class="ju-app">
    <header class="ju-topbar">
      <h1 class="ju-title" id="app-title">Justurbanities — Demo</h1>
      <div class="ju-topbar__controls">
        <label class="ju-lang">
          <span class="ju-lang__label" id="lang-label">Language</span>
          <select class="ju-lang__select" id="lang-select"></select>
        </label>
        <button type="button" class="ju-btn" id="restart-btn">Restart</button>
      </div>
    </header>

    <main class="ju-stage" id="stage">
      <div class="ju-bg" id="bg" aria-hidden="true">
        <span class="ju-bg__label" id="bg-label"></span>
      </div>

      <section class="ju-hud" id="hud" aria-label="Collective resources"></section>

      <div class="ju-portrait-frame" id="portrait-frame" hidden>
        <img class="ju-portrait" id="portrait" alt="">
      </div>

      <section class="ju-dialogue" id="dialogue" data-type="narration">
        <header class="ju-dialogue__header" id="dialogue-header" hidden>
          <span class="ju-dialogue__badge" id="dialogue-badge" aria-hidden="true"></span>
          <span class="ju-speaker" id="speaker"></span>
        </header>
        <p class="ju-text" id="text" aria-hidden="true"></p>
        <p class="ju-visually-hidden" id="text-live" aria-live="polite"></p>
        <div class="ju-choices" id="choices" hidden></div>
        <footer class="ju-dialogue__footer" id="dialogue-footer" hidden>
          <button type="button" class="ju-continue" id="continue-btn">Continue</button>
        </footer>
      </section>

      <div class="ju-end" id="end-screen" hidden>
        <div class="ju-end__card">
          <h2 class="ju-end__title" id="end-title"></h2>
          <p class="ju-end__text" id="end-text"></p>
          <button type="button" class="ju-btn ju-btn--primary" id="end-restart-btn">Restart</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
